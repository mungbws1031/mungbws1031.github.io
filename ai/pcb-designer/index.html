<title>회로 보드 디자이너</title>
<style>
:root{
  --bg:#07100C;--pcb:#091410;--panel:#0C1820;--border:#172230;--border2:#1C3040;
  --text:#9AB4C4;--dim:#334A58;--red:#E60044;--blue:#1A85D8;--green:#16A050;
  --amber:#B87018;--purple:#7828C0;--cyan:#0E94A4;--copper-dim:#5A3818;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;
  font-size:11px;height:100vh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;-webkit-user-select:none;
}

/* HEADER */
#hdr{
  display:flex;align-items:center;padding:7px 14px;gap:14px;flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
}
.hdr-mark{width:8px;height:8px;background:var(--red);border-radius:1px;flex-shrink:0;}
.hdr-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.hdr-title strong{color:var(--text);}
.hdr-title span{color:var(--dim);}
.hdr-sep{width:1px;height:16px;background:var(--border);}
.hdr-stat{font-size:10px;color:var(--dim);}
.hdr-stat b{color:var(--text);font-variant-numeric:tabular-nums;font-weight:normal;}
.hdr-auto{color:var(--amber);}
.hdr-right{margin-left:auto;display:flex;gap:6px;align-items:center;}
.hdr-hint{font-size:9px;color:var(--dim);letter-spacing:.08em;}
.hdr-btn{
  background:none;border:1px solid var(--border2);color:var(--dim);
  padding:3px 10px;font-family:inherit;font-size:9px;letter-spacing:.1em;
  cursor:pointer;transition:all .15s;
}
.hdr-btn:hover{border-color:var(--red);color:var(--red);}
.hdr-btn.secondary:hover{border-color:var(--blue);color:var(--blue);}

/* BOARD SIZE BAR */
#size-bar{
  display:flex;align-items:center;gap:8px;padding:5px 14px;flex-shrink:0;
  background:#090E18;border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.size-lbl{font-size:8px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;flex-shrink:0;}
.size-preset{
  background:none;border:1px solid var(--border);color:var(--dim);
  padding:2px 8px;font-family:inherit;font-size:8px;letter-spacing:.08em;
  cursor:pointer;transition:all .15s;
}
.size-preset:hover{border-color:var(--cyan);color:var(--cyan);}
.size-preset.active{border-color:var(--cyan);color:var(--cyan);background:rgba(14,148,164,.08);}
.size-div{width:1px;height:14px;background:var(--border);flex-shrink:0;}
.size-custom{display:flex;align-items:center;gap:5px;}
.size-inp{
  background:#070D0A;border:1px solid var(--border);color:var(--text);
  width:44px;padding:2px 5px;font-family:inherit;font-size:9px;text-align:center;
}
.size-inp:focus{outline:none;border-color:var(--cyan);}
.size-apply{
  background:none;border:1px solid var(--blue);color:var(--blue);
  padding:2px 9px;font-family:inherit;font-size:8px;cursor:pointer;
  letter-spacing:.1em;transition:all .15s;
}
.size-apply:hover{background:rgba(26,133,216,.1);}
.size-current{font-size:8px;color:var(--dim);margin-left:4px;}

/* VOLTAGE BAR */
#volt-bar{
  display:flex;align-items:center;gap:10px;padding:5px 14px;flex-shrink:0;
  background:#07100E;border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.volt-lbl{font-size:8px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;flex-shrink:0;}
.volt-rail{display:flex;align-items:center;gap:5px;position:relative;}
.volt-rail-name{
  font-size:8px;letter-spacing:.1em;padding:2px 6px;border-radius:1px;
  font-weight:bold;cursor:default;
}
.volt-inp{
  background:#070D0A;border:1px solid var(--border);color:var(--text);
  width:48px;padding:2px 4px;font-family:inherit;font-size:9px;text-align:center;
}
.volt-inp:focus{outline:none;border-color:var(--amber);}
.volt-unit{font-size:8px;color:var(--dim);}
.volt-div{width:1px;height:14px;background:var(--border);flex-shrink:0;}
.volt-badge{
  display:inline-block;font-size:7.5px;letter-spacing:.06em;
  padding:1px 5px;border-radius:1px;font-weight:bold;
  background:rgba(0,0,0,.3);border:1px solid;
}

/* WORKSPACE */
#ws{flex:1;display:grid;grid-template-columns:172px 1fr 195px;min-height:0;overflow:hidden;}

/* PALETTE */
#pal{
  background:var(--panel);border-right:1px solid var(--border);
  overflow-y:auto;padding:8px 7px;display:flex;flex-direction:column;gap:10px;
}
#pal::-webkit-scrollbar{width:3px;}
#pal::-webkit-scrollbar-thumb{background:var(--border2);}
.pal-group{display:flex;flex-direction:column;gap:3px;}
.pal-cat{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:2px;
}
.pal-item{
  background:var(--bg);border:1px solid var(--border2);
  padding:6px 9px 5px 11px;cursor:pointer;display:flex;flex-direction:column;gap:1px;
  transition:border-color .15s,background .15s,transform .1s;
  position:relative;
}
.pal-item:hover{border-color:var(--text);background:#0F1C20;transform:translateX(2px);}
.pal-item:active{transform:translateX(1px);}
.pal-item[draggable]{cursor:grab;}
.pal-item[draggable]:active{cursor:grabbing;}
.pal-color{position:absolute;left:0;top:0;bottom:0;width:3px;}
.pal-name{font-size:10.5px;letter-spacing:.06em;}
.pal-sub{font-size:8px;color:var(--dim);}
.pal-auto{font-size:7.5px;color:var(--amber);letter-spacing:.05em;margin-top:1px;}
.pal-click-hint{
  position:absolute;right:7px;top:50%;transform:translateY(-50%);
  font-size:8px;color:var(--dim);opacity:0;transition:opacity .15s;
}
.pal-item:hover .pal-click-hint{opacity:1;}

/* BOARD */
#board-wrap{position:relative;overflow:auto;background:var(--pcb);}
#board{
  position:relative;
  background-color:#091410;
  background-image:
    radial-gradient(circle,#162A1E 1px,transparent 1px),
    linear-gradient(rgba(20,40,28,.12) 1px,transparent 1px),
    linear-gradient(90deg,rgba(20,40,28,.12) 1px,transparent 1px);
  background-size:20px 20px,100px 100px,100px 100px;
}
#board::before{content:'';position:absolute;inset:18px;border:1px solid #152820;pointer-events:none;}
#board::after{
  content:attr(data-size-label);position:absolute;bottom:24px;right:26px;
  font-size:8.5px;color:#172820;letter-spacing:.1em;pointer-events:none;
}
#board.over{background-color:#0B1C12;}

/* BOARD HINT */
#board-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;transition:opacity .4s;
}
.hint-icon{font-size:30px;opacity:.1;margin-bottom:10px;}
.hint-text{font-size:11px;color:#1E3A26;letter-spacing:.12em;}
.hint-sub{font-size:9px;color:#152218;margin-top:4px;letter-spacing:.08em;}

/* TRACES */
#traces{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

/* COMPONENT */
.comp{
  position:absolute;cursor:move;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:5px 7px 6px;
  background:#090F0C;border:1px solid #1E3030;
  transition:box-shadow .12s;z-index:2;
}
.comp.sel{z-index:10;box-shadow:0 0 0 1.5px var(--blue),0 0 14px rgba(26,133,216,.25);}
.comp-stripe{position:absolute;left:0;top:0;right:0;height:2.5px;}
.comp-sym{display:block;overflow:visible;flex-shrink:0;}
.comp-label{font-size:10.5px;letter-spacing:.06em;font-weight:bold;text-align:center;line-height:1;}
.comp-sub{font-size:7.5px;color:var(--dim);text-align:center;line-height:1.3;}
.comp-auto-badge{
  position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  font-size:6.5px;letter-spacing:.12em;color:var(--amber);
  background:#090F0C;border:1px solid var(--copper-dim);padding:1px 5px;white-space:nowrap;
}
.comp-pin{position:absolute;width:3px;height:3px;background:#1E3530;border-radius:50%;}
.comp-del{
  position:absolute;top:-7px;right:-7px;width:15px;height:15px;
  background:#E60044;color:#fff;border:none;cursor:pointer;font-size:11px;line-height:1;
  display:none;align-items:center;justify-content:center;border-radius:2px;z-index:20;
}
.comp:hover .comp-del,.comp.sel .comp-del{display:flex;}
.comp.auto-comp{border-style:dashed;border-color:var(--copper-dim);}
.comp.auto-comp .comp-stripe{opacity:.5;}

/* PROPS */
#props{
  background:var(--panel);border-left:1px solid var(--border);
  overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:14px;
}
#props::-webkit-scrollbar{width:3px;}
#props::-webkit-scrollbar-thumb{background:var(--border2);}
.sec-lbl{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:2px;
}
.props-hint{font-size:10px;color:var(--dim);text-align:center;padding:24px 0;letter-spacing:.08em;line-height:1.6;}
.pi{display:flex;flex-direction:column;gap:2px;padding:4px 0;}
.pi-k{font-size:8px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;}
.pi-v{font-size:11px;letter-spacing:.04em;}
.comp-entry{
  display:flex;align-items:flex-start;gap:7px;
  padding:5px 7px;background:var(--bg);border:1px solid var(--border);
  margin-bottom:3px;cursor:pointer;transition:border-color .12s;
}
.comp-entry:hover{border-color:var(--border2);}
.entry-dot{width:4px;height:16px;border-radius:1px;flex-shrink:0;margin-top:1px;}
.entry-lbl{font-size:10px;line-height:1.3;}
.entry-sub{font-size:8px;color:var(--dim);}
.del-btn{
  background:none;border:1px solid var(--border2);color:var(--red);
  padding:5px;font-family:inherit;font-size:9px;letter-spacing:.1em;
  cursor:pointer;width:100%;margin-top:4px;transition:all .15s;
}
.del-btn:hover{background:rgba(230,0,68,.08);border-color:var(--red);}

/* TOAST */
#toast-wrap{position:fixed;bottom:16px;right:210px;display:flex;flex-direction:column;gap:5px;pointer-events:none;z-index:200;}
.toast{
  background:#0C1C28;border:1px solid var(--border2);border-left:2px solid var(--amber);
  padding:9px 13px;max-width:320px;min-width:220px;
}
.toast-hd{font-size:9.5px;color:var(--text);letter-spacing:.06em;margin-bottom:5px;}
.toast-row{font-size:8.5px;color:var(--dim);padding:1px 0;}
.toast-row b{color:var(--text);font-weight:normal;}
</style>

<div id="app" style="height:100vh;display:flex;flex-direction:column;overflow:hidden">
<div id="hdr">
  <div class="hdr-mark"></div>
  <div class="hdr-title"><strong>회로 보드 디자이너</strong><span>/ PCB Component Placer</span></div>
  <div class="hdr-sep"></div>
  <div class="hdr-stat">배치: <b id="cnt-main">0</b>개</div>
  <div class="hdr-stat hdr-auto">자동: <b id="cnt-auto">0</b>개</div>
  <div class="hdr-right">
    <span class="hdr-hint">클릭 = 자동배치 &nbsp;·&nbsp; 드래그 = 원하는 위치 &nbsp;·&nbsp; Del = 삭제</span>
    <button class="hdr-btn secondary" id="sort-btn">⊞ 재정렬</button>
    <button class="hdr-btn" id="clear-btn">↺ 초기화</button>
  </div>
</div>

<!-- BOARD SIZE BAR -->
<div id="size-bar">
  <span class="size-lbl">보드 크기</span>
  <button class="size-preset" data-w="85" data-h="55">명함 85×55</button>
  <button class="size-preset" data-w="45" data-h="18">Nano 45×18</button>
  <button class="size-preset" data-w="60" data-h="40">소형 60×40</button>
  <button class="size-preset active" data-w="72" data-h="47">표준 72×47</button>
  <button class="size-preset" data-w="100" data-h="80">대형 100×80</button>
  <div class="size-div"></div>
  <div class="size-custom">
    <span style="font-size:8px;color:var(--dim)">W</span>
    <input class="size-inp" id="inp-w" type="number" min="20" max="400" value="72">
    <span style="font-size:8px;color:var(--dim)">× H</span>
    <input class="size-inp" id="inp-h" type="number" min="20" max="400" value="47">
    <span style="font-size:8px;color:var(--dim)">mm</span>
    <button class="size-apply" id="size-apply-btn">적용</button>
  </div>
  <span class="size-current" id="size-current">1440 × 940 px</span>
</div>

<!-- VOLTAGE BAR -->
<div id="volt-bar">
  <span class="volt-lbl">전원 레일</span>
  <div class="volt-rail">
    <span class="volt-rail-name" style="color:#E60044;border:1px solid #E6004440;background:rgba(230,0,68,.08)">VBAT</span>
    <input class="volt-inp" id="v-vbat" type="number" step="0.1" min="1.0" max="12.0" value="3.0">
    <span class="volt-unit">V</span>
  </div>
  <div class="volt-div"></div>
  <div class="volt-rail">
    <span class="volt-rail-name" style="color:#1A85D8;border:1px solid #1A85D840;background:rgba(26,133,216,.08)">VCC</span>
    <input class="volt-inp" id="v-vcc" type="number" step="0.1" min="1.0" max="12.0" value="3.3">
    <span class="volt-unit">V</span>
  </div>
  <div class="volt-div"></div>
  <div class="volt-rail">
    <span class="volt-rail-name" style="color:#B87018;border:1px solid #B8701840;background:rgba(184,112,24,.08)">VANA</span>
    <input class="volt-inp" id="v-vana" type="number" step="0.1" min="1.0" max="12.0" value="3.3">
    <span class="volt-unit">V</span>
  </div>
  <div class="volt-div"></div>
  <div class="volt-rail">
    <span class="volt-rail-name" style="color:#7828C0;border:1px solid #7828C040;background:rgba(120,40,192,.08)">VCORE</span>
    <input class="volt-inp" id="v-vcore" type="number" step="0.1" min="0.5" max="5.0" value="1.8">
    <span class="volt-unit">V</span>
  </div>
  <div class="volt-div"></div>
  <div class="volt-rail">
    <span class="volt-rail-name" style="color:#16A050;border:1px solid #16A05040;background:rgba(22,160,80,.08)">VREF</span>
    <input class="volt-inp" id="v-vref" type="number" step="0.1" min="0.5" max="5.0" value="2.5">
    <span class="volt-unit">V</span>
  </div>
  <div class="volt-div"></div>
  <span style="font-size:8px;color:var(--dim)">입력 후 Enter · 소자에 반영됨</span>
</div>

<div id="ws">
  <div id="pal"></div>
  <div id="board-wrap">
    <div id="board" data-size-label="PCB · 72×47mm · 20px/mm">
      <div id="board-hint">
        <div class="hint-icon">⊕</div>
        <div class="hint-text">클릭 또는 드래그로 소자 배치</div>
        <div class="hint-sub">좌측 팔레트에서 소자를 선택하세요</div>
      </div>
      <svg id="traces" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div id="props">
    <div class="props-hint" id="props-hint">소자를 클릭하면<br>속성이 표시됩니다</div>
    <div id="props-body" style="display:none"></div>
  </div>
</div>
<div id="toast-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   SCHEMATIC SYMBOLS  —  SVG inner paths per type
   viewBox "0 0 44 26", stroke-only, no fill
═══════════════════════════════════════════════ */
const SYMS = {
  /* 저항 — 지그재그 */
  RES:'<polyline points="2,13 6,13 7,6 9,20 11,6 13,20 15,6 17,20 19,13 22,13" fill="none"/>',
  /* 캐패시터 — 두 평행판 */
  CAP:'<line x1="2" y1="13" x2="19" y2="13"/><line x1="19" y1="6" x2="19" y2="20"/><line x1="21" y1="6" x2="21" y2="20"/><line x1="21" y1="13" x2="38" y2="13"/>',
  /* 인덕터 — 반원 연속 */
  IND:'<path d="M2,13 Q5,6 8,13 Q11,6 14,13 Q17,6 20,13 Q23,6 26,13 Q29,6 32,13" fill="none"/><line x1="32" y1="13" x2="36" y2="13"/>',
  /* 배터리 */
  BATTERY:'<line x1="2" y1="13" x2="12" y2="13"/><line x1="12" y1="7" x2="12" y2="19"/><line x1="15" y1="10" x2="15" y2="16"/><line x1="18" y1="7" x2="18" y2="19"/><line x1="21" y1="10" x2="21" y2="16"/><line x1="24" y1="7" x2="24" y2="19"/><line x1="27" y1="10" x2="27" y2="16"/><line x1="27" y1="13" x2="37" y2="13"/>',
  /* LDO — 3핀 조정기 박스 */
  LDO:'<rect x="8" y="6" width="20" height="14" rx="1" fill="none"/><line x1="1" y1="10" x2="8" y2="10"/><line x1="1" y1="16" x2="8" y2="16"/><line x1="28" y1="13" x2="36" y2="13"/><text x="18" y="15" font-size="5" text-anchor="middle" fill="currentColor">REG</text>',
  /* DC-DC — 인덕터+화살표 */
  DCDC:'<path d="M2,13 Q5,7 8,13 Q11,7 14,13" fill="none"/><line x1="14" y1="13" x2="18" y2="13"/><polygon points="18,10 22,13 18,16" fill="currentColor"/><line x1="22" y1="13" x2="26" y2="13"/><line x1="26" y1="7" x2="26" y2="19"/><line x1="26" y1="13" x2="36" y2="13"/>',
  /* PMOS — P채널 MOSFET */
  MOSFET_P:'<line x1="2" y1="13" x2="14" y2="13"/><line x1="14" y1="7" x2="14" y2="19"/><line x1="16" y1="8" x2="16" y2="12"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="16" y1="10" x2="22" y2="10"/><line x1="16" y1="16" x2="22" y2="16"/><line x1="22" y1="10" x2="22" y2="16"/><line x1="22" y1="13" x2="36" y2="13"/><circle cx="15" cy="13" r="1.5" fill="currentColor"/><polygon points="18,12 22,10 22,12" fill="currentColor"/>',
  /* TVS 다이오드 */
  TVS:'<line x1="2" y1="13" x2="14" y2="13"/><polygon points="14,7 14,19 26,13" fill="currentColor" opacity=".5"/><line x1="26" y1="6" x2="26" y2="20"/><line x1="26" y1="6" x2="29" y2="6"/><line x1="26" y1="20" x2="23" y2="20"/><line x1="26" y1="13" x2="36" y2="13"/>',
  /* MCU — IC 박스 with 핀들 */
  MCU:'<rect x="9" y="4" width="26" height="18" rx="1" fill="none"/><line x1="1" y1="8" x2="9" y2="8"/><line x1="1" y1="13" x2="9" y2="13"/><line x1="1" y1="18" x2="9" y2="18"/><line x1="35" y1="8" x2="43" y2="8"/><line x1="35" y1="13" x2="43" y2="13"/><line x1="35" y1="18" x2="43" y2="18"/><text x="22" y="15" font-size="5" text-anchor="middle" fill="currentColor">MCU</text>',
  /* BLE — 라디오 파형 */
  BLE:'<path d="M6,13 Q10,5 14,13 Q18,21 22,13" fill="none"/><path d="M22,13 Q26,5 30,13 Q34,21 38,13" fill="none"/><line x1="3" y1="13" x2="6" y2="13"/><circle cx="2" cy="13" r="1.5" fill="currentColor"/>',
  /* XTAL — 수정 기호 */
  XTAL:'<line x1="2" y1="13" x2="14" y2="13"/><rect x="14" y="7" width="6" height="12" rx="0" fill="none"/><line x1="20" y1="13" x2="26" y2="13"/><rect x="26" y="7" width="6" height="12" rx="0" fill="none"/><line x1="32" y1="13" x2="42" y2="13"/>',
  /* FLASH — 칩 박스 */

  MCU:'vcc',  BLE:'vcc',  XTAL:'vcc', FLASH:'vcc', EEPROM:'vcc', USB:'vcc',
  LED:'vcc',  PD:'vana',  NTC:'vcc',  IMU:'vcc',   BARO:'vcc',
  OPAMP:'vana', INA:'vana', ADC:'vana', DAC:'vcc', MUX:'vana',
  ESD:'vcc',  FUSE:'vbat', BEAD:'vcc',
  DEBUG:'vcc', UART:'vcc',
  SWITCH:'vcc', LED_IND:'vcc', TP:'vcc', HEADER:'vcc',
  RES:'vcc', CAP:'vcc', IND:'vcc',
};
// 전원 변환기 출력 레일
const OUT_RAIL = {
  LDO:'vcc', DCDC:'vcc',
};

const RAIL_META = {
  vbat:  {name:'VBAT',  col:'#E60044', inp:'v-vbat'},
  vcc:   {name:'VCC',   col:'#1A85D8', inp:'v-vcc'},
  vana:  {name:'VANA',  col:'#B87018', inp:'v-vana'},
  vcore: {name:'VCORE', col:'#7828C0', inp:'v-vcore'},
  vref:  {name:'VREF',  col:'#16A050', inp:'v-vref'},
};

// 현재 전압값 (V)
const VOLTS = {vbat:3.0, vcc:3.3, vana:3.3, vcore:1.8, vref:2.5};

function getVolt(railId){ return VOLTS[railId]??0; }
function fmtV(v){ return v%1===0 ? v.toFixed(1)+'V' : parseFloat(v.toFixed(2))+'V'; }

const CAT_ORDER=['전원','디지털','센서','아날로그','보호','인터페이스','입력','패시브'];
const GRID=20;
let BOARD_W=1440, BOARD_H=940;
let comps=new Map(), selId=null, uid=0;
const genId=()=>'c'+(++uid);
const snap=v=>Math.round(v/GRID)*GRID;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

/* ═══════════════════════════════════════════════
   BOARD SIZE
═══════════════════════════════════════════════ */
const boardEl=document.getElementById('board');
function setBoard(wmm,hmm){
  BOARD_W=wmm*20; BOARD_H=hmm*20;
  boardEl.style.width=BOARD_W+'px';
  boardEl.style.height=BOARD_H+'px';
  boardEl.setAttribute('data-size-label',`PCB · ${wmm}×${hmm}mm · 20px/mm`);
  document.getElementById('size-current').textContent=`${BOARD_W} × ${BOARD_H} px`;
  // 벗어난 소자 클램프
  for(const[,c] of comps){
    c.x=clamp(c.x,0,BOARD_W-c.w); c.y=clamp(c.y,0,BOARD_H-c.h);
    const el=document.getElementById('c-'+c.id);
    if(el){el.style.left=c.x+'px';el.style.top=c.y+'px';}
  }
  refreshTraces();
  // 커서 리셋
  cursorCol=0; cursorRow=0;
}
// 초기 보드 크기는 traceMap 선언 후 적용 (스크립트 하단에서 호출)

// 프리셋 버튼
document.querySelectorAll('.size-preset').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const w=+btn.dataset.w, h=+btn.dataset.h;
    document.querySelectorAll('.size-preset').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('inp-w').value=w;
    document.getElementById('inp-h').value=h;
    setBoard(w,h);
  });
});
// 커스텀 적용
document.getElementById('size-apply-btn').addEventListener('click',()=>{
  const w=Math.max(20,Math.min(400,+document.getElementById('inp-w').value||72));
  const h=Math.max(20,Math.min(400,+document.getElementById('inp-h').value||47));
  document.getElementById('inp-w').value=w;
  document.getElementById('inp-h').value=h;
  document.querySelectorAll('.size-preset').forEach(b=>b.classList.remove('active'));
  setBoard(w,h);
});

/* ═══════════════════════════════════════════════
   AUTO-PLACEMENT CURSOR
═══════════════════════════════════════════════ */
const SLOT_W=280, SLOT_H=340;
const ORIGIN_X=180, ORIGIN_Y=200;
let cursorCol=0, cursorRow=0;

function maxCols(){return Math.max(1,Math.floor((BOARD_W-ORIGIN_X-60)/SLOT_W));}

function nextPos(def){
  let minDx=0,minDy=0;
  for(const c of def.companions){minDx=Math.min(minDx,c.dx);minDy=Math.min(minDy,c.dy);}
  const ox=clamp(ORIGIN_X+cursorCol*SLOT_W-minDx, 30, BOARD_W-def.w-30);
  const oy=clamp(ORIGIN_Y+cursorRow*SLOT_H-minDy, 30, BOARD_H-def.h-30);
  cursorCol++;
  if(cursorCol>=maxCols()){cursorCol=0;cursorRow++;}
  if(cursorRow>=3){cursorCol=0;cursorRow=0;}
  return {x:snap(ox),y:snap(oy)};
}

/* ═══════════════════════════════════════════════
   BUILD PALETTE
═══════════════════════════════════════════════ */
const palEl=document.getElementById('pal');
const grouped={};
for(const[t,d] of Object.entries(DEFS)){(grouped[d.cat]||(grouped[d.cat]=[])).push({t,d});}
for(const cat of CAT_ORDER){
  if(!grouped[cat]) continue;
  const g=document.createElement('div');
  g.className='pal-group';
  g.innerHTML=`<div class="pal-cat">${cat}</div>`;
  for(const{t,d} of grouped[cat]){
    const n=d.companions.length;
    const item=document.createElement('div');
    item.className='pal-item';
    item.draggable=true;
    item.dataset.type=t;
    item.innerHTML=`
      <div class="pal-color" style="background:${d.col}"></div>
      <div class="pal-name" style="color:${d.col}">${d.label}</div>
      <div class="pal-sub">${d.sub}</div>
      ${n?`<div class="pal-auto">+${n}개 자동 세트</div>`:''}
      <div class="pal-click-hint">클릭 ↵</div>
    `;
    item.addEventListener('click',e=>{
      if(e.defaultPrevented) return;
      const pos=nextPos(d);
      const id=place(t,pos.x,pos.y,false,null,'');
      const bw=document.getElementById('board-wrap');
      const comp=comps.get(id);
      if(comp) setTimeout(()=>{
        bw.scrollTo({left:Math.max(0,comp.x-100),top:Math.max(0,comp.y-120),behavior:'smooth'});
      },80);
    });
    item.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('type',t);
      e.dataTransfer.effectAllowed='copy';
    });
    g.appendChild(item);
  }
  palEl.appendChild(g);
}

/* ═══════════════════════════════════════════════
   BOARD DROP
═══════════════════════════════════════════════ */
boardEl.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';boardEl.classList.add('over');});
boardEl.addEventListener('dragleave',e=>{if(!boardEl.contains(e.relatedTarget)) boardEl.classList.remove('over');});
boardEl.addEventListener('drop',e=>{
  e.preventDefault();
  boardEl.classList.remove('over');
  const t=e.dataTransfer.getData('type');
  if(!t||!DEFS[t]) return;
  const rect=boardEl.getBoundingClientRect();
  const d=DEFS[t];
  const x=clamp(snap(e.clientX-rect.left-d.w/2),20,BOARD_W-d.w-20);
  const y=clamp(snap(e.clientY-rect.top-d.h/2),20,BOARD_H-d.h-20);
  place(t,x,y,false,null,'');
});

/* ═══════════════════════════════════════════════
   PLACE
═══════════════════════════════════════════════ */
function place(type,x,y,isAuto=false,parentId=null,reason=''){
  const def=DEFS[type]; if(!def) return null;
  const id=genId();
  const c={id,type,x,y,w:def.w,h:def.h,label:def.label,sub:def.sub,
           col:def.col,isAuto,parentId,reason,kids:[]};
  comps.set(id,c);
  buildEl(c);
  if(parentId){const p=comps.get(parentId);if(p) p.kids.push(id);}
  if(!isAuto&&def.companions.length) setTimeout(()=>autoAdd(id,x,y,def.companions),260);
  updateHint();updateBom();
  return id;
}

function autoAdd(parentId,px,py,companions){
  const parent=comps.get(parentId);if(!parent) return;
  const added=[];
  for(const c of companions){
    const d=DEFS[c.type];if(!d) continue;
    const cx=clamp(snap(px+c.dx),20,BOARD_W-d.w-20);
    const cy=clamp(snap(py+c.dy),20,BOARD_H-d.h-20);
    const cid=place(c.type,cx,cy,true,parentId,c.reason);
    if(!cid) continue;
    const cc=comps.get(cid);
    if(cc){
      cc.label=c.label;cc.sub=c.sub;
      const el=document.getElementById('c-'+cid);
      if(el){el.querySelector('.comp-label').textContent=c.label;el.querySelector('.comp-sub').textContent=c.sub;}
      drawTrace(parentId,cid);
    }
    added.push({label:c.label,sub:c.sub,reason:c.reason});
  }
  toast(parent.label,added);
  updateBom();
}

/* ═══════════════════════════════════════════════
   BUILD DOM ELEMENT
═══════════════════════════════════════════════ */
function getSym(type,col){
  const inner=SYMS[type]||SYMS.RES;
  const sw='stroke:'+col+';stroke-width:1.2;';
  return `<svg class="comp-sym" width="44" height="26" viewBox="0 0 44 26"
    style="${sw}fill:none;color:${col};opacity:${0.75}">
    ${inner}
  </svg>`;
}

function voltBadgeHtml(type){
  const railId = RAIL_MAP[type]||'vcc';
  const rm = RAIL_META[railId]||RAIL_META.vcc;
  const v = fmtV(getVolt(railId));
  // 전원 변환기는 입력+출력 둘 다 표시
  if(OUT_RAIL[type]){
    const outId = OUT_RAIL[type];
    const orm = RAIL_META[outId]||RAIL_META.vcc;
    const ov = fmtV(getVolt(outId));
    return `<span class="volt-badge" style="color:${rm.col};border-color:${rm.col}44">${rm.name} ${v}</span>`
          +`<span style="font-size:7px;color:var(--dim)">→</span>`
          +`<span class="volt-badge" style="color:${orm.col};border-color:${orm.col}44">${orm.name} ${ov}</span>`;
  }
  return `<span class="volt-badge" style="color:${rm.col};border-color:${rm.col}44">${rm.name} ${v}</span>`;
}

function buildEl(c){
  const el=document.createElement('div');
  el.className='comp'+(c.isAuto?' auto-comp':'');
  el.id='c-'+c.id;
  el.style.cssText=`left:${c.x}px;top:${c.y}px;width:${c.w}px;min-height:${c.h}px;`
    +`border-color:${c.isAuto?c.col+'44':c.col+'80'};`;
  el.innerHTML=`
    <div class="comp-stripe" style="background:${c.col};opacity:${c.isAuto?.5:1}"></div>
    ${c.isAuto?'<div class="comp-auto-badge">AUTO</div>':''}
    ${getSym(c.type,c.col)}
    <div class="comp-label" style="color:${c.col}">${c.label}</div>
    <div class="comp-sub">${c.sub}</div>
    <div class="comp-volt" style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:2px">${voltBadgeHtml(c.type)}</div>
    <button class="comp-del" title="삭제">×</button>
  `;
  [[3,3],[c.w-3,3],[3,c.h-3],[c.w-3,c.h-3]].forEach(([l,t])=>{
    const p=document.createElement('div');
    p.className='comp-pin';
    p.style.cssText=`left:${l}px;top:${t}px;transform:translate(-50%,-50%)`;
    el.appendChild(p);
  });
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('comp-del')) return;
    e.stopPropagation();
    select(c.id);
    dragComp(e,c,el);
  });
  el.querySelector('.comp-del').addEventListener('click',e=>{e.stopPropagation();del(c.id);});
  boardEl.appendChild(el);
  el.style.opacity='0';el.style.transform='scale(.84)';
  el.style.transition='opacity .22s,transform .22s';
  requestAnimationFrame(()=>{
    el.style.opacity='1';el.style.transform='scale(1)';
    setTimeout(()=>el.style.transition='box-shadow .12s',260);
  });
}

/* ═══════════════════════════════════════════════
   DRAG WITHIN BOARD
═══════════════════════════════════════════════ */
function dragComp(e0,c,el){
  const sx=e0.clientX,sy=e0.clientY,ox=c.x,oy=c.y;
  function move(e){
    c.x=clamp(snap(ox+e.clientX-sx),0,BOARD_W-c.w);
    c.y=clamp(snap(oy+e.clientY-sy),0,BOARD_H-c.h);
    el.style.left=c.x+'px';el.style.top=c.y+'px';
    refreshTraces();
  }
  function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}

/* ═══════════════════════════════════════════════
   SELECT / DESELECT
═══════════════════════════════════════════════ */
function select(id){
  if(selId){const pe=document.getElementById('c-'+selId);if(pe) pe.classList.remove('sel');}
  selId=id;
  const el=document.getElementById('c-'+id);if(el) el.classList.add('sel');
  renderProps(id);
}
boardEl.addEventListener('mousedown',e=>{
  if(e.target===boardEl||e.target.id==='traces'||e.target.tagName==='svg') deselect();
});
function deselect(){
  if(selId){const pe=document.getElementById('c-'+selId);if(pe) pe.classList.remove('sel');}
  selId=null;renderProps(null);
}

/* ═══════════════════════════════════════════════
   DELETE
═══════════════════════════════════════════════ */
function del(id){
  const c=comps.get(id);if(!c) return;
  for(const kid of [...c.kids]){
    removeTraces(kid);
    const ke=document.getElementById('c-'+kid);if(ke) ke.remove();
    comps.delete(kid);
  }
  if(c.parentId){const p=comps.get(c.parentId);if(p) p.kids=p.kids.filter(k=>k!==id);}
  removeTraces(id);
  const el=document.getElementById('c-'+id);if(el) el.remove();
  comps.delete(id);
  if(selId===id){selId=null;renderProps(null);}
  updateBom();updateHint();
}

/* ═══════════════════════════════════════════════
   TRACES
═══════════════════════════════════════════════ */
const tracesSvg=document.getElementById('traces');
const traceMap=new Map();
const ctr=c=>({x:c.x+c.w/2,y:c.y+c.h/2});

function drawTrace(fromId,toId){
  const key=`${fromId}~${toId}`;
  if(traceMap.has(key)) return;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('stroke','#6A4020');
  path.setAttribute('stroke-width','1.5');
  path.setAttribute('fill','none');
  path.setAttribute('stroke-dasharray','5,5');
  path.setAttribute('opacity','.4');
  tracesSvg.appendChild(path);
  traceMap.set(key,path);
  updTrace(fromId,toId);
}
function updTrace(fromId,toId){
  const f=comps.get(fromId),t=comps.get(toId),key=`${fromId}~${toId}`,path=traceMap.get(key);
  if(!f||!t||!path) return;
  const a=ctr(f),b=ctr(t),mx=(a.x+b.x)/2;
  path.setAttribute('d',`M${a.x},${a.y} L${mx},${a.y} L${mx},${b.y} L${b.x},${b.y}`);
}
function refreshTraces(){for(const[key] of traceMap){const[f,t]=key.split('~');updTrace(f,t);}}
function removeTraces(id){for(const[key,path] of traceMap){if(key.startsWith(id+'~')||key.endsWith('~'+id)){path.remove();traceMap.delete(key);}}}

/* ═══════════════════════════════════════════════
   PROPS PANEL
═══════════════════════════════════════════════ */
function renderProps(id){
  const hint=document.getElementById('props-hint'),body=document.getElementById('props-body');
  if(!id){hint.style.display='block';body.style.display='none';body.innerHTML='';return;}
  const c=comps.get(id);
  if(!c){hint.style.display='block';body.style.display='none';return;}
  hint.style.display='none';body.style.display='block';
  let kidsHtml='',parentHtml='';
  if(c.kids.length){
    kidsHtml=`<div class="sec-lbl" style="margin-top:4px">자동 세트 소자</div>`;
    for(const kid of c.kids){
      const k=comps.get(kid);if(!k) continue;
      kidsHtml+=`<div class="comp-entry" onclick="select('${kid}')">
        <div class="entry-dot" style="background:${k.col}"></div>
        <div><div class="entry-lbl">${k.label} <span style="color:var(--dim)">${k.sub}</span></div>
        <div class="entry-sub">${k.reason}</div></div></div>`;
    }
  }
  if(c.parentId){
    const p=comps.get(c.parentId);
    if(p) parentHtml=`<div class="sec-lbl" style="margin-top:4px">부모 소자</div>
      <div class="comp-entry" onclick="select('${p.id}')">
        <div class="entry-dot" style="background:${p.col}"></div>
        <div><div class="entry-lbl">${p.label}</div>
        <div class="entry-sub">${c.reason}</div></div></div>`;
  }
  body.innerHTML=`
    <div class="sec-lbl">선택 소자</div>
    <div class="pi"><div class="pi-k">이름</div><div class="pi-v" style="color:${c.col}">${c.label}</div></div>
    <div class="pi"><div class="pi-k">사양</div><div class="pi-v">${c.sub}</div></div>
    <div class="pi"><div class="pi-k">위치</div><div class="pi-v" style="font-size:10px">(${Math.round(c.x/20)}mm, ${Math.round(c.y/20)}mm)</div></div>
    ${(()=>{
      const railId=RAIL_MAP[c.type]||'vcc';
      const rm=RAIL_META[railId]||RAIL_META.vcc;
      const v=fmtV(getVolt(railId));
      let html=`<div class="pi"><div class="pi-k">전원 레일</div>
        <div class="pi-v"><span style="color:${rm.col}">${rm.name}</span> <span style="color:var(--text)">${v}</span></div></div>`;
      if(OUT_RAIL[c.type]){
        const outId=OUT_RAIL[c.type];
        const orm=RAIL_META[outId]||RAIL_META.vcc;
        html+=`<div class="pi"><div class="pi-k">출력 레일</div>
          <div class="pi-v"><span style="color:${orm.col}">${orm.name}</span> <span style="color:var(--text)">${fmtV(getVolt(outId))}</span></div></div>`;
      }
      return html;
    })()}
    ${c.isAuto?`<div class="pi"><div class="pi-k">구분</div><div class="pi-v" style="color:var(--amber)">AUTO 세트</div></div>`:''}
    ${kidsHtml}${parentHtml}
    <button class="del-btn" onclick="del('${id}')">× 삭제 (세트 포함)</button>
  `;
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
const toastWrap=document.getElementById('toast-wrap');
function toast(parentLabel,added){
  if(!added.length) return;
  const div=document.createElement('div');
  div.className='toast';
  div.innerHTML=`<div class="toast-hd">⚡ <b>${parentLabel}</b> — 자동 추가됨</div>`
    +added.map(a=>`<div class="toast-row"><b>${a.label} ${a.sub}</b> — ${a.reason}</div>`).join('');
  toastWrap.appendChild(div);
  div.style.cssText='opacity:0;transform:translateX(10px);transition:opacity .25s,transform .25s';
  requestAnimationFrame(()=>{div.style.opacity='1';div.style.transform='translateX(0)';});
  setTimeout(()=>{div.style.transition='opacity .3s,transform .3s';div.style.opacity='0';div.style.transform='translateX(10px)';setTimeout(()=>div.remove(),350);},3200);
}

/* ═══════════════════════════════════════════════
   BOM + HINT
═══════════════════════════════════════════════ */
function updateBom(){
  let m=0,a=0;for(const[,c] of comps){if(c.isAuto)a++;else m++;}
  document.getElementById('cnt-main').textContent=m+a;
  document.getElementById('cnt-auto').textContent=a;
}
function updateHint(){document.getElementById('board-hint').style.opacity=comps.size?'0':'1';}

/* ═══════════════════════════════════════════════
   재정렬
═══════════════════════════════════════════════ */
document.getElementById('sort-btn').addEventListener('click',()=>{
  const parents=[...comps.values()].filter(c=>!c.isAuto);
  cursorCol=0;cursorRow=0;
  for(const p of parents){
    const def=DEFS[p.type];if(!def) continue;
    const pos=nextPos(def);
    const dx=pos.x-p.x,dy=pos.y-p.y;
    p.x=pos.x;p.y=pos.y;
    const pe=document.getElementById('c-'+p.id);
    if(pe){pe.style.left=p.x+'px';pe.style.top=p.y+'px';}
    for(const kid of p.kids){
      const k=comps.get(kid);if(!k) continue;
      k.x=clamp(k.x+dx,20,BOARD_W-k.w-20);
      k.y=clamp(k.y+dy,20,BOARD_H-k.h-20);
      const ke=document.getElementById('c-'+kid);
      if(ke){ke.style.left=k.x+'px';ke.style.top=k.y+'px';}
    }
  }
  refreshTraces();
});

/* ═══════════════════════════════════════════════
   VOLTAGE RAIL 업데이트
═══════════════════════════════════════════════ */
function applyVoltage(railId, v){
  VOLTS[railId]=v;
  // 해당 레일 또는 출력 레일이 이 railId인 소자 전압 뱃지 갱신
  for(const[,c] of comps){
    const cRail=RAIL_MAP[c.type]||'vcc';
    const cOut=OUT_RAIL[c.type];
    if(cRail===railId || cOut===railId){
      const el=document.getElementById('c-'+c.id);
      if(el){
        const vDiv=el.querySelector('.comp-volt');
        if(vDiv) vDiv.innerHTML=voltBadgeHtml(c.type);
      }
    }
  }
  // props 패널 갱신
  if(selId) renderProps(selId);
}

// 전압 입력 이벤트 등록
for(const[railId,rm] of Object.entries(RAIL_META)){
  const inp=document.getElementById(rm.inp);
  if(!inp) continue;
  const commit=()=>{
    const v=parseFloat(inp.value);
    if(!isNaN(v)&&v>0){VOLTS[railId]=v;applyVoltage(railId,v);}
  };
  inp.addEventListener('change',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter') commit();});
}

document.getElementById('clear-btn').addEventListener('click',()=>{
  if(!comps.size) return;
  for(const[,c] of comps){const e=document.getElementById('c-'+c.id);if(e)e.remove();}
  comps.clear();traceMap.clear();tracesSvg.innerHTML='';
  selId=null;cursorCol=0;cursorRow=0;
  renderProps(null);updateBom();updateHint();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Delete'&&selId) del(selId);
  if(e.key==='Escape') deselect();
});

// 초기 보드 크기 적용 (표준 72×47mm) — 모든 선언 완료 후
setBoard(72,47);
</script>
