<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PCB 보드 디자이너</title>
<style>
:root{
  --bg:#E8EFF6;--pcb:#1C3D1C;--panel:#FFFFFF;--panel2:#F4F7FB;
  --border:#D4DDE8;--border2:#BCC8D8;--text:#1A2940;--dim:#5A7090;
  --red:#DC2050;--blue:#1878D0;--green:#168050;--amber:#C07820;
  --purple:#7830C0;--cyan:#0898B0;--copper:#8A5F3C;
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:13px;height:100vh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;-webkit-user-select:none;
}
#hdr{
  height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
  box-shadow:0 1px 8px rgba(0,0,0,.08);z-index:100;
}
.hdr-logo{display:flex;align-items:center;gap:9px;}
.hdr-dot{width:10px;height:10px;background:var(--red);border-radius:2px;}
.hdr-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.hdr-sub{font-size:11px;color:var(--dim);}
.hdr-sep{width:1px;height:22px;background:var(--border2);margin:0 2px;}
.hdr-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--panel2);border:1px solid var(--border);border-radius:20px;
  padding:3px 10px 3px 8px;font-size:11px;color:var(--dim);
}
.hdr-chip b{color:var(--text);font-weight:600;}
.hdr-chip-dot{width:5px;height:5px;border-radius:50%;}
/* board size row in header */
.hdr-size-group{display:flex;align-items:center;gap:5px;}
.hdr-size-lbl{font-size:10px;color:var(--dim);letter-spacing:.05em;margin-right:2px;}
.hdr-size-btn{
  padding:3px 8px;border-radius:5px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--dim);font-size:10px;cursor:pointer;
  transition:all .14s;font-family:inherit;font-weight:500;
}
.hdr-size-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.hdr-size-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(8,152,176,.09);}
.spacer{flex:1;}
.hdr-actions{display:flex;gap:7px;}
.hdr-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--panel2);border:1px solid var(--border2);color:var(--dim);
  padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;
  transition:all .14s;font-family:inherit;
}
.hdr-btn:hover{border-color:var(--blue);color:var(--blue);background:#EEF4FF;}
.hdr-btn.primary{border-color:var(--blue);color:var(--blue);}
.hdr-btn.danger:hover{border-color:var(--red);color:var(--red);background:#FFF0F3;}
#ws{flex:1;display:grid;grid-template-columns:200px 1fr 220px;min-height:0;}
#pal{
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#pal-header{padding:12px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#pal-search{
  width:100%;background:var(--panel2);border:1px solid var(--border2);
  color:var(--text);padding:7px 10px;border-radius:7px;font-size:12px;
  font-family:inherit;outline:none;transition:border-color .15s;
}
#pal-search:focus{border-color:var(--blue);}
#pal-search::placeholder{color:var(--dim);}
#pal-scroll{flex:1;overflow-y:auto;padding:8px 10px 16px;}
#pal-scroll::-webkit-scrollbar{width:3px;}
#pal-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.pal-cat-hd{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);padding:10px 4px 6px;
}
.pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px;}
.pal-card{
  background:var(--panel2);border:1px solid var(--border);border-radius:8px;
  padding:9px 7px 7px;cursor:pointer;transition:all .17s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;overflow:hidden;
}
.pal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0;}
.pal-card:hover{border-color:var(--dim);transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.10);}
.pal-card:active{transform:translateY(0);}
.pal-card-sym{display:block;opacity:.8;}
.pal-card-name{font-size:11px;font-weight:700;text-align:center;line-height:1.2;}
.pal-card-sub{font-size:9px;color:var(--dim);text-align:center;line-height:1.3;}
.pal-card-badge{
  font-size:8px;color:var(--amber);background:rgba(192,120,32,.10);
  border:1px solid rgba(192,120,32,.25);border-radius:10px;
  padding:1px 5px;margin-top:1px;
}
/* BOARD */
#board-wrap{position:relative;overflow:auto;background:var(--bg);}
#board-wrap::-webkit-scrollbar{width:6px;height:6px;}
#board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
#board{
  position:relative;
  background-color:#1C3D1C;
  background-image:
    radial-gradient(circle,#2A5A2A 1px,transparent 1px),
    linear-gradient(rgba(42,90,42,.18) 1px,transparent 1px),
    linear-gradient(90deg,rgba(42,90,42,.18) 1px,transparent 1px);
  background-size:20px 20px,100px 100px,100px 100px;
  border:1px solid #143214;
  margin:14px;border-radius:5px;
  box-shadow:0 0 0 1px #0A1A0A,var(--shadow);
}
#board::after{
  content:attr(data-lbl);position:absolute;bottom:12px;right:16px;
  font-size:10px;color:#3A6A3A;letter-spacing:.08em;pointer-events:none;
  font-family:'SF Mono','Courier New',monospace;
}
#board.over{background-color:#224822;}
#board-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;transition:opacity .3s;
}
.hint-icon{font-size:38px;opacity:.12;margin-bottom:12px;}
.hint-t{font-size:13px;color:#3A6A3A;font-weight:500;margin-bottom:4px;}
.hint-s{font-size:11px;color:#2A4A2A;}
#traces{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
/* COMPONENT */
.comp{
  position:absolute;cursor:move;
  background:rgba(255,255,255,0.97);border:1.5px solid var(--border2);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:0;padding:10px 10px 8px;
  box-shadow:0 2px 12px rgba(0,0,0,.13);
  transition:box-shadow .15s,border-color .15s;z-index:2;
}
.comp:hover{box-shadow:0 5px 22px rgba(0,0,0,.20);}
.comp.sel{z-index:10;box-shadow:0 0 0 2px var(--blue),0 4px 22px rgba(24,120,208,.22);}
.comp-top-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:12px 12px 0 0;}
.comp-sym{display:block;flex-shrink:0;margin-bottom:5px;}
.comp-label{font-size:13px;font-weight:800;text-align:center;line-height:1;letter-spacing:-.2px;margin-bottom:2px;}
.comp-sub{font-size:8.5px;color:var(--dim);text-align:center;line-height:1.3;margin-bottom:3px;}
.comp-desc{font-size:9px;color:var(--text);text-align:center;line-height:1.4;font-weight:500;margin-bottom:2px;}
.comp-spec{font-size:8px;color:var(--dim);text-align:center;line-height:1.3;
  background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  padding:1px 6px;margin-bottom:4px;white-space:nowrap;}
.comp-volt-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
.comp-vbadge{
  font-size:7.5px;font-weight:600;padding:1px 5px;border-radius:10px;
  border:1px solid;letter-spacing:.03em;
}
.comp-auto-tag{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  font-size:7px;font-weight:600;letter-spacing:.1em;
  color:var(--amber);background:var(--panel);border:1px solid rgba(192,120,32,.4);
  padding:1px 5px;border-radius:10px;white-space:nowrap;
}
.comp-del{
  position:absolute;top:-8px;right:-8px;width:18px;height:18px;
  background:var(--red);color:#fff;border:none;cursor:pointer;
  font-size:13px;line-height:1;display:none;align-items:center;justify-content:center;
  border-radius:50%;z-index:20;box-shadow:0 2px 6px rgba(220,32,80,.35);
}
.comp:hover .comp-del,.comp.sel .comp-del{display:flex;}
.comp.auto-comp{border-style:dashed;border-color:rgba(180,190,200,.6);background:rgba(248,250,254,.92);}
.comp.auto-comp .comp-top-bar{opacity:.4;}
.comp-pin{position:absolute;width:4px;height:4px;background:#A0B4C8;border-radius:50%;border:1px solid #7090A8;}
/* PROPS */
#props{
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#props-inner{flex:1;overflow-y:auto;padding:14px 13px;}
#props-inner::-webkit-scrollbar{width:3px;}
#props-inner::-webkit-scrollbar-thumb{background:var(--border2);}
.props-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--dim);font-size:12px;text-align:center;
}
.props-empty-icon{font-size:30px;opacity:.20;}
.p-sect{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);padding:12px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.p-sect:first-child{padding-top:0;}
.p-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;}
.p-key{font-size:10px;color:var(--dim);}
.p-val{font-size:12px;font-weight:500;}
.p-chip{display:inline-flex;align-items:center;gap:4px;background:var(--panel2);
  border:1px solid var(--border);border-radius:6px;padding:4px 9px;
  font-size:10px;cursor:pointer;transition:border-color .14s;margin-bottom:3px;width:100%;}
.p-chip:hover{border-color:var(--blue);}
.p-chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.p-chip-info{flex:1;}
.p-chip-name{font-size:11px;font-weight:500;}
.p-chip-sub{font-size:9px;color:var(--dim);}
.p-del{
  width:100%;margin-top:12px;padding:8px;border-radius:7px;
  background:rgba(220,32,80,.06);border:1px solid rgba(220,32,80,.25);color:var(--red);
  font-size:12px;cursor:pointer;transition:all .14s;font-family:inherit;
}
.p-del:hover{background:rgba(220,32,80,.12);}
/* SETTINGS OVERLAY */
#settings-overlay{
  position:fixed;inset:0;z-index:500;display:none;
  background:rgba(20,30,50,.45);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;
}
#settings-overlay.open{display:flex;}
#settings-panel{
  background:var(--panel);border:1px solid var(--border2);border-radius:14px;
  padding:26px;width:520px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.sp-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.sp-sect{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sp-sect+.sp-sect{margin-top:20px;}
.sp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.sp-preset{
  padding:6px 12px;border-radius:7px;border:1px solid var(--border2);
  background:var(--panel2);color:var(--dim);font-size:11px;cursor:pointer;
  transition:all .14s;font-family:inherit;
}
.sp-preset:hover{border-color:var(--cyan);color:var(--cyan);}
.sp-preset.active{border-color:var(--cyan);color:var(--cyan);background:rgba(8,152,176,.08);}
.sp-custom{display:flex;align-items:center;gap:6px;margin-top:6px;}
.sp-inp{
  background:var(--panel2);border:1px solid var(--border2);color:var(--text);
  width:62px;padding:6px 8px;border-radius:7px;font-family:inherit;font-size:12px;
  text-align:center;outline:none;transition:border-color .14s;
}
.sp-inp:focus{border-color:var(--blue);}
.sp-lbl{font-size:11px;color:var(--dim);}
.sp-apply{
  padding:6px 16px;border-radius:7px;border:1px solid var(--blue);
  color:var(--blue);background:rgba(24,120,208,.08);font-size:12px;cursor:pointer;
  transition:all .14s;font-family:inherit;
}
.sp-apply:hover{background:rgba(24,120,208,.16);}
.sp-rails{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sp-rail{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.sp-rail-name{font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:6px;}
.sp-rail-row{display:flex;align-items:center;gap:6px;}
.sp-rail-inp{
  flex:1;background:var(--panel);border:1px solid var(--border2);color:var(--text);
  padding:5px 8px;border-radius:7px;font-family:inherit;font-size:12px;
  text-align:center;outline:none;transition:border-color .14s;
}
.sp-rail-inp:focus{border-color:var(--amber);}
.sp-close{
  margin-top:20px;width:100%;padding:9px;border-radius:8px;
  border:1px solid var(--border2);background:var(--panel2);color:var(--dim);
  font-size:13px;cursor:pointer;transition:all .14s;font-family:inherit;
}
.sp-close:hover{border-color:var(--text);color:var(--text);}
/* KIT OVERLAY */
#kit-overlay{
  position:fixed;inset:0;z-index:500;display:none;
  background:rgba(20,30,50,.45);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;
}
#kit-overlay.open{display:flex;}
#kit-panel{
  background:var(--panel);border:1px solid var(--border2);border-radius:14px;
  padding:26px;width:620px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.kit-card{
  background:var(--panel2);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .15s;
}
.kit-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 18px rgba(24,120,208,.15);}
.kit-name{font-size:14px;font-weight:800;margin-bottom:5px;}
.kit-desc{font-size:11px;color:var(--dim);line-height:1.55;margin-bottom:8px;}
.kit-parts{display:flex;gap:3px;flex-wrap:wrap;}
.kit-part{
  font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;
  border:1px solid;letter-spacing:.02em;
}
.kit-meta{font-size:9px;color:var(--dim);margin-top:7px;}
/* GUIDE BUBBLE */
#guide{
  position:fixed;left:214px;bottom:18px;z-index:400;
  display:flex;align-items:flex-end;gap:10px;max-width:430px;
  pointer-events:none;
}
#guide-char{
  width:52px;height:52px;flex-shrink:0;border-radius:50%;
  background:linear-gradient(135deg,#1878D0,#0898B0);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;box-shadow:0 4px 14px rgba(24,120,208,.35);
  border:2.5px solid #fff;
}
#guide-bubble{
  background:#fff;border:1.5px solid var(--border2);border-radius:14px 14px 14px 4px;
  padding:12px 15px;box-shadow:0 6px 24px rgba(0,0,0,.14);
  pointer-events:auto;position:relative;
  transition:opacity .3s,transform .3s;
}
#guide.hide{opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none;}
#guide{transition:opacity .3s,transform .3s;}
.gb-title{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.gb-text{font-size:12px;color:var(--text);line-height:1.65;padding-right:14px;}
.gb-text b{color:var(--blue);font-weight:700;}
.gb-text .hl{background:rgba(24,120,208,.10);border-radius:4px;padding:0 4px;font-weight:600;}
.gb-close{
  position:absolute;top:6px;right:8px;border:none;background:none;
  color:var(--dim);font-size:14px;cursor:pointer;padding:2px;line-height:1;font-family:inherit;
}
.gb-close:hover{color:var(--red);}
.gb-step{font-size:9px;color:var(--dim);margin-top:6px;letter-spacing:.05em;}
/* TOAST */
#toast-wrap{position:fixed;bottom:20px;right:240px;display:flex;flex-direction:column;gap:6px;pointer-events:none;z-index:300;}
.toast{
  background:var(--panel);border:1px solid var(--border2);border-radius:9px;
  border-left:3px solid var(--amber);padding:10px 14px;
  max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.12);
}
.toast-hd{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;}
.toast-row{font-size:10px;color:var(--dim);padding:1px 0;}
.toast-row b{color:var(--text);font-weight:500;}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdr-logo">
    <div class="hdr-dot"></div>
    <span class="hdr-name">PCB 보드 디자이너</span>
    <span class="hdr-sub">Component Placer</span>
  </div>
  <div class="hdr-sep"></div>
  <div class="hdr-chip">
    <div class="hdr-chip-dot" style="background:#1878D0"></div>
    소자 <b id="cnt-main">0</b>개
  </div>
  <div class="hdr-chip">
    <div class="hdr-chip-dot" style="background:#C07820"></div>
    자동 <b id="cnt-auto">0</b>개
  </div>
  <div class="hdr-sep"></div>
  <div class="hdr-size-group">
    <span class="hdr-size-lbl">보드</span>
    <button class="hdr-size-btn" data-w="45" data-h="18">45×18</button>
    <button class="hdr-size-btn" data-w="60" data-h="40">60×40</button>
    <button class="hdr-size-btn active" data-w="72" data-h="47">72×47</button>
    <button class="hdr-size-btn" data-w="85" data-h="55">85×55</button>
    <button class="hdr-size-btn" data-w="100" data-h="80">100×80</button>
  </div>
  <div class="spacer"></div>
  <div class="hdr-actions">
    <button class="hdr-btn primary" id="kit-btn">📦 보드 세트</button>
    <button class="hdr-btn" id="settings-btn">⚙ 설정</button>
    <button class="hdr-btn" id="sort-btn">⊞ 재정렬</button>
    <button class="hdr-btn danger" id="clear-btn">↺ 초기화</button>
  </div>
</div>

<div id="ws">
  <div id="pal">
    <div id="pal-header">
      <input id="pal-search" type="text" placeholder="🔍  소자 검색...">
    </div>
    <div id="pal-scroll"></div>
  </div>
  <div id="board-wrap">
    <div id="board" data-lbl="PCB · 72×47mm">
      <div id="board-hint">
        <div class="hint-icon">⊕</div>
        <div class="hint-t">클릭 또는 드래그로 소자 배치</div>
        <div class="hint-s">좌측 팔레트에서 소자를 선택하세요</div>
      </div>
      <svg id="traces" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div id="props">
    <div id="props-inner">
      <div class="props-empty" id="props-empty">
        <div class="props-empty-icon">◎</div>
        <div>소자를 클릭하면<br>속성이 표시됩니다</div>
      </div>
      <div id="props-body" style="display:none"></div>
    </div>
  </div>
</div>

<div id="settings-overlay">
  <div id="settings-panel">
    <div class="sp-title">⚙ 설정</div>
    <div class="sp-sect">보드 크기</div>
    <div class="sp-row">
      <button class="sp-preset" data-w="85" data-h="55">명함 85×55</button>
      <button class="sp-preset" data-w="45" data-h="18">Nano 45×18</button>
      <button class="sp-preset" data-w="60" data-h="40">소형 60×40</button>
      <button class="sp-preset active" data-w="72" data-h="47">표준 72×47</button>
      <button class="sp-preset" data-w="100" data-h="80">대형 100×80</button>
    </div>
    <div class="sp-custom">
      <span class="sp-lbl">W</span>
      <input class="sp-inp" id="inp-w" type="number" min="20" max="400" value="72">
      <span class="sp-lbl">× H</span>
      <input class="sp-inp" id="inp-h" type="number" min="20" max="400" value="47">
      <span class="sp-lbl">mm</span>
      <button class="sp-apply" id="size-apply-btn">적용</button>
    </div>
    <div class="sp-sect" style="margin-top:20px">전원 레일</div>

/* compact board cards: icon+label+badge only (desc/spec live in props panel) */
for(const d of Object.values(DEFS)){d.w=Math.max(70,Math.round(d.w*0.72));d.h=88;}
DEFS.MCU.w=104;DEFS.MCU.h=96;

/* ── BOARD KITS (세트 템플릿) ── */
const KITS={
  ppg:{name:'💓 심박 측정기',desc:'LED로 빛을 쏘고 반사광으로 맥박을 재는 PPG 측정 보드',board:[100,80],parts:['BATTERY','LDO','MCU','BLE','LED','PD','NTC']},
  temp:{name:'🌡️ 온도 측정기',desc:'서미스터로 온도를 재고 LED로 표시하는 기본 측정 보드',board:[72,47],parts:['BATTERY','LDO','MCU','NTC','LED_IND','SWITCH']},
  env:{name:'🌫️ 환경 분석기',desc:'기압·움직임을 기록하는 데이터 수집 분석 보드',board:[100,80],parts:['USB','LDO','MCU','BARO','IMU','FLASH','DEBUG']},
  logger:{name:'📊 데이터 로거',desc:'센서값을 플래시에 저장하고 USB로 내보내는 기록계',board:[85,55],parts:['USB','LDO','MCU','EEPROM','FLASH','NTC','LED_IND']},
  ble:{name:'📡 무선 리모컨',desc:'버튼 입력을 블루투스로 보내는 무선 송신기',board:[60,40],parts:['BATTERY','LDO','MCU','BLE','SWITCH','LED_IND']},
  analog:{name:'📈 신호 분석기',desc:'미세한 아날로그 신호를 증폭·변환해 측정하는 계측 보드',board:[100,80],parts:['USB','LDO','MCU','INA','ADC','MUX','TP']},
};

const CAT_ORDER=['전원','디지털','센서','아날로그','보호','인터페이스','입력','패시브'];
const GRID=20;
let BOARD_W=1440,BOARD_H=940;
let comps=new Map(),selId=null,uid=0;
const genId=()=>'c'+(++uid);
const snap=v=>Math.round(v/GRID)*GRID;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

/* ── BOARD SIZE ── */
const boardEl=document.getElementById('board');
function setBoard(wmm,hmm){
  BOARD_W=wmm*20;BOARD_H=hmm*20;
  boardEl.style.width=BOARD_W+'px';boardEl.style.height=BOARD_H+'px';
  boardEl.setAttribute('data-lbl',`PCB · ${wmm}×${hmm}mm`);
  for(const[,c] of comps){
    c.x=clamp(c.x,0,BOARD_W-c.w);c.y=clamp(c.y,0,BOARD_H-c.h);
    const el=document.getElementById('c-'+c.id);
    if(el){el.style.left=c.x+'px';el.style.top=c.y+'px';}
  }
  refreshTraces();cursorCol=0;cursorRow=0;
}

/* ── CURSOR ── */
const SLOT_W=300,SLOT_H=380,ORIGIN_X=200,ORIGIN_Y=240;
let cursorCol=0,cursorRow=0;
function maxCols(){return Math.max(1,Math.floor((BOARD_W-ORIGIN_X-60)/SLOT_W));}
function nextPos(def){
  let minDx=0,minDy=0;
  for(const c of def.companions){minDx=Math.min(minDx,c.dx);minDy=Math.min(minDy,c.dy);}
  const ox=clamp(ORIGIN_X+cursorCol*SLOT_W-minDx,40,BOARD_W-def.w-40);
  const oy=clamp(ORIGIN_Y+cursorRow*SLOT_H-minDy,40,BOARD_H-def.h-40);
  cursorCol++;
  if(cursorCol>=maxCols()){cursorCol=0;cursorRow++;}
  if(cursorRow>=3){cursorCol=0;cursorRow=0;}
  return{x:snap(ox),y:snap(oy)};
}

/* ── PALETTE ── */
function symSvg(type,col){
  const inner=SYMS[type]||SYMS.RES;
  return `<svg class="pal-card-sym" width="44" height="26" viewBox="0 0 44 26"
    style="stroke:${col};stroke-width:1.4;fill:none;color:${col}">${inner}</svg>`;
}
function iconSvg(type,size=48){
  const inner=ICONS[type]||ICONS.RES;
  return `<svg class="comp-sym" width="${size}" height="${size}" viewBox="0 0 48 48"
    xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

const palScroll=document.getElementById('pal-scroll');
const grouped={};
for(const[t,d] of Object.entries(DEFS)){(grouped[d.cat]||(grouped[d.cat]=[])).push({t,d});}

function buildPalette(filter=''){
  palScroll.innerHTML='';
  for(const cat of CAT_ORDER){
    if(!grouped[cat]) continue;
    const items=grouped[cat].filter(({t,d})=>
      !filter||d.label.toLowerCase().includes(filter)||d.sub.toLowerCase().includes(filter)||t.toLowerCase().includes(filter));
    if(!items.length) continue;
    const hd=document.createElement('div');
    hd.className='pal-cat-hd';hd.textContent=cat;palScroll.appendChild(hd);
    const grid=document.createElement('div');grid.className='pal-grid';
    for(const{t,d} of items){
      const card=document.createElement('div');
      card.className='pal-card';card.draggable=true;card.dataset.type=t;
      card.innerHTML=`
        <style>.pal-card[data-type="${t}"]::before{background:${d.col}}</style>
        ${symSvg(t,d.col)}
        <div class="pal-card-name" style="color:${d.col}">${d.label}</div>
        <div class="pal-card-sub">${d.desc||d.sub}</div>
        ${d.companions.length?`<div class="pal-card-badge">+${d.companions.length} 자동</div>`:''}
      `;
      card.addEventListener('click',e=>{
        if(e.defaultPrevented) return;
        const pos=nextPos(d);const id=place(t,pos.x,pos.y,false,null,'');
        const bw=document.getElementById('board-wrap');const comp=comps.get(id);
        if(comp) setTimeout(()=>bw.scrollTo({left:Math.max(0,comp.x-100),top:Math.max(0,comp.y-120),behavior:'smooth'}),80);
      });
      card.addEventListener('dragstart',e=>{e.dataTransfer.setData('type',t);e.dataTransfer.effectAllowed='copy';});
      grid.appendChild(card);
    }
    palScroll.appendChild(grid);
  }
}
buildPalette();
document.getElementById('pal-search').addEventListener('input',e=>buildPalette(e.target.value.toLowerCase().trim()));

/* ── BOARD EVENTS ── */
boardEl.addEventListener('dragover',e=>{e.preventDefault();boardEl.classList.add('over');});
boardEl.addEventListener('dragleave',e=>{if(!boardEl.contains(e.relatedTarget))boardEl.classList.remove('over');});
boardEl.addEventListener('drop',e=>{
  e.preventDefault();boardEl.classList.remove('over');
  const t=e.dataTransfer.getData('type');if(!t||!DEFS[t]) return;
  const rect=boardEl.getBoundingClientRect();const d=DEFS[t];
  const x=clamp(snap(e.clientX-rect.left-d.w/2),20,BOARD_W-d.w-20);
  const y=clamp(snap(e.clientY-rect.top-d.h/2),20,BOARD_H-d.h-20);
  place(t,x,y,false,null,'');
});

/* ── VOLTAGE BADGE ── */
function voltBadge(type){
  const rid=RAIL_MAP[type]||'vcc',rm=RAIL_META[rid];
  const v=fmtV(VOLTS[rid]||0);
  let html=`<span class="comp-vbadge" style="color:${rm.col};border-color:${rm.col}55;background:${rm.col}14">${rm.name} ${v}</span>`;
  if(OUT_RAIL[type]){
    const oid=OUT_RAIL[type],orm=RAIL_META[oid];
    html+=`<span class="comp-vbadge" style="color:${orm.col};border-color:${orm.col}55;background:${orm.col}14">${orm.name} ${fmtV(VOLTS[oid])}</span>`;
  }
  return html;
}

/* ── PLACE / BUILD ── */
function place(type,x,y,isAuto=false,parentId=null,reason=''){
  const def=DEFS[type];if(!def) return null;
  const id=genId();
  const c={id,type,x,y,w:def.w,h:def.h,label:def.label,sub:def.sub,col:def.col,isAuto,parentId,reason,kids:[]};
  comps.set(id,c);buildEl(c);
  if(parentId){const p=comps.get(parentId);if(p)p.kids.push(id);}
  if(!isAuto&&def.companions.length) setTimeout(()=>autoAdd(id,x,y,def.companions),280);
  updateHint();updateBom();return id;
}

function buildEl(c){
  const el=document.createElement('div');
  el.className='comp'+(c.isAuto?' auto-comp':'');
  el.id='c-'+c.id;
  el.style.cssText=`left:${c.x}px;top:${c.y}px;width:${c.w}px;min-height:${c.h}px;border-color:${c.isAuto?c.col+'44':c.col+'88'};`;
  el.innerHTML=`
    <div class="comp-top-bar" style="background:${c.col};opacity:${c.isAuto?.4:1}"></div>
    ${c.isAuto?'<div class="comp-auto-tag">AUTO</div>':''}
    ${iconSvg(c.type,38)}
    <div class="comp-label" style="color:${c.col}">${c.label}</div>
    <div class="comp-volt-row">${voltBadge(c.type)}</div>
    <button class="comp-del">×</button>
  `;
  [[3,3],[c.w-3,3],[3,c.h-3],[c.w-3,c.h-3]].forEach(([l,t])=>{
    const p=document.createElement('div');p.className='comp-pin';
    p.style.cssText=`left:${l}px;top:${t}px;transform:translate(-50%,-50%)`;el.appendChild(p);
  });
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('comp-del')) return;
    e.stopPropagation();select(c.id);dragComp(e,c,el);
  });
  el.querySelector('.comp-del').addEventListener('click',e=>{e.stopPropagation();del(c.id);});
  boardEl.appendChild(el);
  el.style.opacity='0';el.style.transform='scale(.86) translateY(8px)';
  el.style.transition='opacity .22s,transform .22s';
  requestAnimationFrame(()=>{el.style.opacity='1';el.style.transform='scale(1) translateY(0)';
    setTimeout(()=>el.style.transition='box-shadow .15s,border-color .15s',250);});
}

function autoAdd(parentId,px,py,companions){
  const parent=comps.get(parentId);if(!parent) return;
  const added=[];
  for(const c of companions){
    const d=DEFS[c.type];if(!d) continue;
    const cx=clamp(snap(px+c.dx),20,BOARD_W-d.w-20);
    const cy=clamp(snap(py+c.dy),20,BOARD_H-d.h-20);
    const cid=place(c.type,cx,cy,true,parentId,c.reason);if(!cid) continue;
    const cc=comps.get(cid);
    if(cc){cc.label=c.label;cc.sub=c.sub;
      const el=document.getElementById('c-'+cid);
      if(el){el.querySelector('.comp-label').textContent=c.label;el.querySelector('.comp-sub').textContent=c.sub;}
      drawTrace(parentId,cid);}
    added.push({label:c.label,sub:c.sub,reason:c.reason});
  }
  toast(parent.label,added);updateBom();
}

/* ── DRAG ── */
function dragComp(e0,c,el){
  const sx=e0.clientX,sy=e0.clientY,ox=c.x,oy=c.y;
  const mv=e=>{c.x=clamp(snap(ox+e.clientX-sx),0,BOARD_W-c.w);c.y=clamp(snap(oy+e.clientY-sy),0,BOARD_H-c.h);el.style.left=c.x+'px';el.style.top=c.y+'px';refreshTraces();};
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}

/* ── SELECT ── */
function select(id){
  if(selId){const pe=document.getElementById('c-'+selId);if(pe)pe.classList.remove('sel');}
  selId=id;const el=document.getElementById('c-'+id);if(el)el.classList.add('sel');
  renderProps(id);
}
boardEl.addEventListener('mousedown',e=>{if(e.target===boardEl||e.target.closest('#traces'))deselect();});
function deselect(){if(selId){const pe=document.getElementById('c-'+selId);if(pe)pe.classList.remove('sel');}selId=null;renderProps(null);}

/* ── DELETE ── */
function del(id){
  const c=comps.get(id);if(!c) return;
  for(const kid of [...c.kids]){removeTraces(kid);const ke=document.getElementById('c-'+kid);if(ke)ke.remove();comps.delete(kid);}
  if(c.parentId){const p=comps.get(c.parentId);if(p)p.kids=p.kids.filter(k=>k!==id);}
  removeTraces(id);const el=document.getElementById('c-'+id);if(el)el.remove();
  comps.delete(id);if(selId===id){selId=null;renderProps(null);}
  updateBom();updateHint();
}

/* ── TRACES ── */
const tracesSvg=document.getElementById('traces');
const traceMap=new Map();
const ctr=c=>({x:c.x+c.w/2,y:c.y+c.h/2});
function drawTrace(fid,tid){
  const key=`${fid}~${tid}`;if(traceMap.has(key)) return;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('stroke','#5A8A5A');path.setAttribute('stroke-width','1.5');
  path.setAttribute('fill','none');path.setAttribute('stroke-dasharray','5,4');path.setAttribute('opacity','.5');
  tracesSvg.appendChild(path);traceMap.set(key,path);updTrace(fid,tid);
}
function updTrace(fid,tid){
  const f=comps.get(fid),t=comps.get(tid),key=`${fid}~${tid}`,path=traceMap.get(key);
  if(!f||!t||!path) return;
  const a=ctr(f),b=ctr(t),mx=(a.x+b.x)/2;
  path.setAttribute('d',`M${a.x},${a.y} L${mx},${a.y} L${mx},${b.y} L${b.x},${b.y}`);
}
function refreshTraces(){for(const[key] of traceMap){const[f,t]=key.split('~');updTrace(f,t);}}
function removeTraces(id){for(const[key,path] of traceMap){if(key.startsWith(id+'~')||key.endsWith('~'+id)){path.remove();traceMap.delete(key);}}}

/* ── PROPS ── */
function renderProps(id){
  const empty=document.getElementById('props-empty'),body=document.getElementById('props-body');
  if(!id){empty.style.display='flex';body.style.display='none';body.innerHTML='';return;}
  const c=comps.get(id);if(!c){empty.style.display='flex';body.style.display='none';return;}
  empty.style.display='none';body.style.display='block';
  const rid=RAIL_MAP[c.type]||'vcc',rm=RAIL_META[rid];
  let kidsHtml='',parentHtml='';
  if(c.kids.length){
    kidsHtml=`<div class="p-sect">자동 세트 소자</div>`;
    for(const kid of c.kids){const k=comps.get(kid);if(!k) continue;
      kidsHtml+=`<div class="p-chip" onclick="select('${kid}')">
        <div class="p-chip-dot" style="background:${k.col}"></div>
        <div class="p-chip-info"><div class="p-chip-name">${k.label} <span style="color:var(--dim);font-size:9px">${k.sub}</span></div>
        <div class="p-chip-sub">${k.reason}</div></div></div>`;}
  }
  if(c.parentId){const p=comps.get(c.parentId);if(p)parentHtml=`<div class="p-sect">부모 소자</div>
    <div class="p-chip" onclick="select('${p.id}')"><div class="p-chip-dot" style="background:${p.col}"></div>
    <div class="p-chip-info"><div class="p-chip-name">${p.label}</div><div class="p-chip-sub">${c.reason}</div></div></div>`;}
  const dd=DEFS[c.type]||{};
  body.innerHTML=`
    <div class="p-sect">선택 소자</div>
    <div style="text-align:center;padding:6px 0 10px">${iconSvg(c.type,56)}</div>
    ${dd.desc?`<div style="font-size:12px;font-weight:600;text-align:center;margin-bottom:4px">${dd.desc}</div>`:''}
    ${dd.spec?`<div style="font-size:10px;color:var(--dim);text-align:center;margin-bottom:10px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:4px 8px">${dd.spec}</div>`:''}
    <div class="p-row"><span class="p-key">이름</span><span class="p-val" style="color:${c.col}">${c.label}</span></div>
    <div class="p-row"><span class="p-key">사양</span><span class="p-val" style="font-size:11px">${c.sub}</span></div>
    <div class="p-row"><span class="p-key">위치</span><span class="p-val" style="font-size:11px">${Math.round(c.x/20)}mm, ${Math.round(c.y/20)}mm</span></div>
    <div class="p-row"><span class="p-key">레일</span><span class="p-val" style="color:${rm.col}">${rm.name} ${fmtV(VOLTS[rid])}</span></div>
    ${c.isAuto?'<div class="p-row"><span class="p-key">구분</span><span class="p-val" style="color:var(--amber)">AUTO 자동배치</span></div>':''}
    ${kidsHtml}${parentHtml}
    <button class="p-del" onclick="del('${id}')">× 삭제 (세트 포함)</button>`;
}

/* ── TOAST ── */
const toastWrap=document.getElementById('toast-wrap');
function toast(parentLabel,added){
  if(!added.length) return;
  const div=document.createElement('div');div.className='toast';
  div.innerHTML=`<div class="toast-hd">⚡ ${parentLabel} — 자동 추가</div>`+added.map(a=>`<div class="toast-row"><b>${a.label} ${a.sub}</b> — ${a.reason}</div>`).join('');
  toastWrap.appendChild(div);
  div.style.cssText='opacity:0;transform:translateX(12px);transition:opacity .22s,transform .22s';
  requestAnimationFrame(()=>{div.style.opacity='1';div.style.transform='translateX(0)';});
  setTimeout(()=>{div.style.cssText='transition:opacity .3s,transform .3s;opacity:0;transform:translateX(12px)';setTimeout(()=>div.remove(),350);},3500);
}

/* ── BOM / HINT ── */
function updateBom(){let m=0,a=0;for(const[,c] of comps){if(c.isAuto)a++;else m++;}document.getElementById('cnt-main').textContent=m+a;document.getElementById('cnt-auto').textContent=a;}
function updateHint(){document.getElementById('board-hint').style.opacity=comps.size?'0':'1';}

/* ── VOLTAGE UPDATE ── */
function applyVoltage(railId,v){
  VOLTS[railId]=v;
  for(const[,c] of comps){
    const cr=RAIL_MAP[c.type]||'vcc',co=OUT_RAIL[c.type];
    if(cr===railId||co===railId){const el=document.getElementById('c-'+c.id);if(el){const vr=el.querySelector('.comp-volt-row');if(vr)vr.innerHTML=voltBadge(c.type);}}
  }
  if(selId) renderProps(selId);
}
for(const[railId,rm] of Object.entries(RAIL_META)){
  const inp=document.getElementById(rm.inp);if(!inp) continue;
  const commit=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>0) applyVoltage(railId,v);};
  inp.addEventListener('change',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();});
}

/* ── SETTINGS ── */
const overlay=document.getElementById('settings-overlay');
document.getElementById('settings-btn').addEventListener('click',()=>overlay.classList.add('open'));
document.getElementById('settings-close').addEventListener('click',()=>overlay.classList.remove('open'));
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open');});

function syncSizeButtons(w,h){
  document.querySelectorAll('.sp-preset,.hdr-size-btn').forEach(b=>{
    b.classList.toggle('active',+b.dataset.w===w&&+b.dataset.h===h);
  });
}
document.querySelectorAll('.sp-preset').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const w=+btn.dataset.w,h=+btn.dataset.h;
    document.getElementById('inp-w').value=w;document.getElementById('inp-h').value=h;
    setBoard(w,h);syncSizeButtons(w,h);
  });
});
document.querySelectorAll('.hdr-size-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const w=+btn.dataset.w,h=+btn.dataset.h;
    document.getElementById('inp-w').value=w;document.getElementById('inp-h').value=h;
    setBoard(w,h);syncSizeButtons(w,h);
  });
});
document.getElementById('size-apply-btn').addEventListener('click',()=>{
  const w=Math.max(20,Math.min(400,+document.getElementById('inp-w').value||72));
  const h=Math.max(20,Math.min(400,+document.getElementById('inp-h').value||47));
  document.getElementById('inp-w').value=w;document.getElementById('inp-h').value=h;
  setBoard(w,h);syncSizeButtons(w,h);
});

/* ── SORT / CLEAR / KEYBOARD ── */
document.getElementById('sort-btn').addEventListener('click',()=>{
  const parents=[...comps.values()].filter(c=>!c.isAuto);
  cursorCol=0;cursorRow=0;
  for(const p of parents){
    const def=DEFS[p.type];if(!def) continue;
    const pos=nextPos(def);const dx=pos.x-p.x,dy=pos.y-p.y;
    p.x=pos.x;p.y=pos.y;
    const pe=document.getElementById('c-'+p.id);if(pe){pe.style.left=p.x+'px';pe.style.top=p.y+'px';}
    for(const kid of p.kids){
      const k=comps.get(kid);if(!k) continue;
      k.x=clamp(k.x+dx,20,BOARD_W-k.w-20);k.y=clamp(k.y+dy,20,BOARD_H-k.h-20);
      const ke=document.getElementById('c-'+kid);if(ke){ke.style.left=k.x+'px';ke.style.top=k.y+'px';}
    }
  }
  refreshTraces();
});
document.getElementById('clear-btn').addEventListener('click',()=>{
  if(!comps.size) return;
  for(const[,c] of comps){const e=document.getElementById('c-'+c.id);if(e)e.remove();}
  comps.clear();traceMap.clear();tracesSvg.innerHTML='';selId=null;cursorCol=0;cursorRow=0;
  renderProps(null);updateBom();updateHint();
});
document.addEventListener('keydown',e=>{if(e.key==='Delete'&&selId)del(selId);if(e.key==='Escape'){deselect();overlay.classList.remove('open');}});

setBoard(72,47);

/* ── BEGINNER GUIDE ── */
const GUIDE_MSGS={
  welcome:{t:'👋 환영합니다!',x:'여기는 <b>전자 보드(PCB) 만들기 연습장</b>이에요. 초록색 판이 전자 부품을 올려놓는 기판이고, <span class="hl">왼쪽 목록</span>이 부품 창고예요.<br>먼저 왼쪽에서 <b>MCU</b>(두뇌 칩)를 클릭해보세요!',s:'STEP 1 / 5'},
  firstPlace:{t:'🎉 첫 부품 배치 성공!',x:'방금 놓은 부품 주변에 <span class="hl">점선으로 연결된 작은 부품들</span>이 자동으로 따라왔죠? 칩이 안정적으로 작동하려면 <b>커패시터(C)·저항(R)</b> 같은 보조 부품이 항상 필요해서, 제가 자동으로 넣어드린 거예요.',s:'STEP 2 / 5'},
  firstSelect:{t:'🔍 부품 정보 보기',x:'부품을 클릭하면 <span class="hl">오른쪽 패널</span>에 상세 정보가 나와요. 어떤 전압을 쓰는지, 어떤 보조 부품이 딸려있는지 확인할 수 있어요.<br>부품을 <b>드래그</b>하면 위치도 옮길 수 있어요!',s:'STEP 3 / 5'},
  firstDrag:{t:'✋ 이동 완료!',x:'부품이 <span class="hl">격자(1mm 단위)</span>에 맞춰 움직여요. 실제 PCB 설계에서도 이렇게 부품을 정렬해요.<br>부품 위 <b>× 버튼</b>으로 삭제할 수도 있어요 (세트로 같이 지워져요).',s:'STEP 4 / 5'},
  sizeChange:{t:'📐 보드 크기 변경!',x:'실제 제품 크기에 맞춰 기판 크기를 정해요. <b>45×18</b>은 USB 메모리만 하고, <b>100×80</b>은 손바닥만 해요.<br>부품이 많으면 큰 보드를 쓰면 돼요.',s:'TIP'},
  voltage:{t:'⚡ 전압이란?',x:'부품마다 필요한 전기의 세기(<b>전압</b>)가 달라요. <span class="hl">VBAT</span>은 배터리 원본 전압, <span class="hl">VCC</span>는 칩들이 쓰는 전압이에요. 각 부품의 색깔 뱃지가 어떤 전압을 쓰는지 알려줘요.',s:'TIP'},
  clear:{t:'🧹 깨끗해졌어요',x:'처음부터 다시 시작! 이번엔 <b>전원부(BATT→LDO)</b> 먼저 놓고 → <b>MCU</b> → <b>센서</b> 순서로 놓아보세요. 실제 엔지니어들이 설계하는 순서랍니다.',s:'TIP'},
  done:{t:'🏆 기본 조작 마스터!',x:'이제 자유롭게 만들어보세요. 추천 조합: <b>BATT + LDO + MCU + BLE + 센서 1개</b> = 실제 웨어러블 기기 구성이에요!<br>말풍선이 방해되면 <b>×</b>를 눌러 닫을 수 있어요.',s:'STEP 5 / 5 · 완료'},
};
const guideEl=document.getElementById('guide');
const gbTitle=document.getElementById('gb-title'),gbText=document.getElementById('gb-text'),gbStep=document.getElementById('gb-step');
let guideOff=false,guideTimer=null;
const guideSeen={};
function showGuide(key,autoHideMs=0){
  if(guideOff||guideSeen[key]) return;
  guideSeen[key]=true;
  const m=GUIDE_MSGS[key];if(!m) return;
  gbTitle.innerHTML=m.t;gbText.innerHTML=m.x;gbStep.textContent=m.s;
  guideEl.classList.remove('hide');
  clearTimeout(guideTimer);
  if(autoHideMs) guideTimer=setTimeout(()=>guideEl.classList.add('hide'),autoHideMs);
}
document.getElementById('guide-close').addEventListener('click',()=>{
  guideEl.classList.add('hide');guideOff=true;
});

/* hook guide into existing actions */
const _place=place;
place=function(type,x,y,isAuto,parentId,reason){
  const id=_place(type,x,y,isAuto,parentId,reason);
  if(!isAuto&&id){
    showGuide('firstPlace');
    if(comps.size>10) showGuide('done');
  }
  return id;
};
const _select=select;
select=function(id){_select(id);showGuide('firstSelect');};
const _setBoard=setBoard;
setBoard=function(w,h){_setBoard(w,h);if(comps.size||guideSeen.welcome) showGuide('sizeChange',12000);};
document.addEventListener('mouseup',()=>{if(selId&&guideSeen.firstSelect) showGuide('firstDrag');});
document.getElementById('settings-btn').addEventListener('click',()=>showGuide('voltage',15000));
document.getElementById('clear-btn').addEventListener('click',()=>{if(guideSeen.firstPlace) showGuide('clear',12000);});

/* ── KIT PICKER ── */
const kitOverlay=document.getElementById('kit-overlay');
const kitGrid=document.getElementById('kit-grid');
for(const[kid,k] of Object.entries(KITS)){
  const card=document.createElement('div');
  card.className='kit-card';
  card.innerHTML=`
    <div class="kit-name">${k.name}</div>
    <div class="kit-desc">${k.desc}</div>
    <div class="kit-parts">${k.parts.map(p=>{const d=DEFS[p];
      return `<span class="kit-part" style="color:${d.col};border-color:${d.col}55;background:${d.col}12">${d.label}</span>`;}).join('')}</div>
    <div class="kit-meta">보드 ${k.board[0]}×${k.board[1]}mm · 부품 ${k.parts.length}종 + 보조부품 자동</div>`;
  card.addEventListener('click',()=>loadKit(kid));
  kitGrid.appendChild(card);
}
function loadKit(kid){
  const k=KITS[kid];if(!k) return;
  // clear board
  for(const[,c] of comps){const e=document.getElementById('c-'+c.id);if(e)e.remove();}
  comps.clear();traceMap.clear();tracesSvg.innerHTML='';selId=null;renderProps(null);
  setBoard(k.board[0],k.board[1]);
  document.getElementById('inp-w').value=k.board[0];document.getElementById('inp-h').value=k.board[1];
  syncSizeButtons(k.board[0],k.board[1]);
  cursorCol=0;cursorRow=0;
  // place parts sequentially for nicer animation
  k.parts.forEach((p,i)=>{
    setTimeout(()=>{const pos=nextPos(DEFS[p]);place(p,pos.x,pos.y,false,null,'');},i*180);
  });
  kitOverlay.classList.remove('open');
  updateBom();updateHint();
  gbTitle.innerHTML=k.name+' 세트 완성!';
  gbStep.textContent='KIT';
  gbText.innerHTML=`<b>${k.parts.length}종</b>의 핵심 부품과 보조 부품이 자동 배치됐어요. 각 부품을 클릭하면 <span class="hl">오른쪽 패널</span>에서 무슨 역할인지 볼 수 있어요!`;
  guideEl.classList.remove('hide');
}
document.getElementById('kit-btn').addEventListener('click',()=>kitOverlay.classList.add('open'));
document.getElementById('kit-close').addEventListener('click',()=>kitOverlay.classList.remove('open'));
kitOverlay.addEventListener('click',e=>{if(e.target===kitOverlay)kitOverlay.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')kitOverlay.classList.remove('open');});

/* welcome: open kit picker for beginners */
setTimeout(()=>showGuide('welcome'),600);
setTimeout(()=>{if(!comps.size)kitOverlay.classList.add('open');},900);
</script>
